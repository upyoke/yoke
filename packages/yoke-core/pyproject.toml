[build-system]
# Exact backends keep PEP 517 builds reproducible. Setuptools 83 is current;
# 82.0.1 is the final exact line compatible with supported Python 3.9.
requires = [
    "setuptools==82.0.1; python_version < '3.10'",
    "setuptools==83.0.0; python_version >= '3.10'",
    "setuptools-scm[toml]==10.2.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "yoke-core"
dynamic = ["version"]
description = "Yoke core — server runtime and the single source of control-plane authority"
license = "FSL-1.1-ALv2"
license-files = ["LICENSE.md"]
requires-python = ">=3.9"
dependencies = [
    "yoke-contracts",
    "yoke-cli",
    # Harness-identity helpers (yoke_harness.hooks.identity): the session
    # domain canonicalizes executor/harness ids through them at import time
    # (boot path: yoke_core.domain -> frontier -> session canonicalization),
    # so the engine wheel cannot boot without the harness wheel. The reverse
    # edge stays forbidden — yoke-harness never imports yoke-core.
    "yoke-harness",
    # fastapi 0.129+ / uvicorn 0.40+ dropped Python 3.9; pin to the last 3.9-compatible
    # versions so core stays installable on stock Apple Python 3.9. Both install
    # cleanly on 3.10-3.14 via prebuilt wheels.
    "fastapi==0.128.8",
    "uvicorn[standard]==0.39.0",
    "pydantic==2.13.4",
    # Release tooling parses and validates PEP 440 versions and PEP 508
    # product-sibling requirements in built wheel metadata.
    "packaging>=24,<27",
    # libsodium binding — encrypts GitHub Actions secrets (sealed-box ciphertexts).
    "pynacl>=1.5.0,<2.0",
    # Postgres driver, declared on yoke-core: the engine (and this driver)
    # ships in every product install. Database access is controlled by DSN
    # possession, not driver absence — https-transport machines hold no DSN
    # and never dispatch in-process.
    "psycopg[binary]>=3.1,<4",
    # Cloud core-service resolves its current Aurora password from the
    # RDS-managed Secrets Manager secret instead of carrying a static DSN file.
    "boto3>=1.35,<2",
    # OpenTelemetry transport/correlation for cloud runtime observability.
    "opentelemetry-api>=1.30,<2",
    "opentelemetry-sdk>=1.30,<2",
    "opentelemetry-exporter-otlp-proto-http>=1.30,<2",
    "opentelemetry-instrumentation-fastapi>=0.51b0,<1",
    # OIDC id_token signature verification against the provider's JWKS
    # (PyJWKClient + RS*/ES* decode). The [crypto] extra brings the
    # `cryptography` backend the asymmetric algorithms require. Chosen over
    # authlib: the browser sign-in door only needs discovery + code
    # exchange (stdlib urllib) + token verification, not a full OAuth
    # client framework surface.
    "PyJWT[crypto]>=2.8,<3",
]

[project.optional-dependencies]
test = [
    "pytest==8.4.2",
    "pytest-cov==6.0.0",
    "pytest-xdist==3.8.0",
    "filelock>=3.13,<4",
    "httpx==0.28.1",
]

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.1.0"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
# The universe UI runtime and its declaration-emitting host contract ship in
# the wheel; the server exposes only the closed static asset roster.
"yoke_core.ui" = ["static/*", "contracts/*"]
"yoke_core.install_bundle_tree" = [
    ".agents/skills/yoke/**/*",
    "runtime/harness/claude/agents/**/*",
    "runtime/harness/claude/rules/**/*",
    "runtime/harness/codex/agents/**/*",
]
