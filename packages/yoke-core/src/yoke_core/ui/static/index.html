<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yoke</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="./assets/favicon.ico">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="stylesheet" href="./assets/theme.css">
  <link rel="stylesheet" href="./assets/shell.css">
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body class="local-universe-page">
  <div id="universe-root"></div>
  <script type="module">
    // Bootstrap: hand the mount root to the app module and get out of the
    // way. The session cookie set by this page's response authenticates the
    // module fetch and every API call, so nothing token-shaped lives here.
    import { mountUniverseApp } from "./assets/app.js";
    mountUniverseApp(document.getElementById("universe-root"), {
      capabilities: {
        data: { portability: { mode: "local", sectionOwned: false } },
      },
    });
  </script>
</body>
</html>
