# nginx-ephemeral.conf — Convention-based ephemeral subdomain routing
#
# Stateless wildcard server block that computes the container port from
# the subdomain name using the same SHA-256 hash algorithm as the deploy
# workflow. No per-deploy config files (.conf/.port) are needed.
#
# Requires: ngx_http_js_module (njs). Install on Ubuntu:
#   apt install libnginx-mod-http-js  (auto-loads via modules-enabled/)
# Other distros:
#   apt install nginx-module-njs
#   Then add to the top of /etc/nginx/nginx.conf:
#     load_module modules/ngx_http_js_module.so;
#
# Listens on 0.0.0.0:443 so the host can bind regardless of whether the
# public IP is directly assigned to a network interface or NAT'd via an
# upstream Elastic IP. If another service (e.g., Tailscale) needs port 443
# on a specific interface, pin its own bind address rather than narrowing
# nginx here.
#
# Runtime settings supplied by the installed Pack source:
#   {{domain}}         — project domain (e.g., example.com)
#   {{port_base}}      — base port for web containers (e.g., 4000)
#   {{port_range}}     — modulo range for hash (e.g., 100)
#   {{project_name}}   — project identifier (lowercase)
#
# Port computation:
#   offset = parseInt(sha256(subdomain).substring(0, 8), 16) % {{port_range}}
#   port   = {{port_base}} + offset
#
# Place at: /etc/nginx/sites-available/{{project_name}}-ephemeral
# Symlink:  /etc/nginx/sites-enabled/{{project_name}}-ephemeral

js_path /etc/nginx/njs.d;
js_import ephemeral from ephemeral_port.js;

# Map subdomain to computed port via njs
js_set $ephemeral_port ephemeral.computePort;

server {
    listen 0.0.0.0:443 ssl;
    server_name ~^(?<subdomain>.+)\.{{domain}}$;

    ssl_certificate     /etc/letsencrypt/live/{{domain}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{domain}}/privkey.pem;

    # Reject requests where the computed upstream is unreachable
    # (container not running). nginx returns 502 naturally in this case.

    location / {
        proxy_pass http://127.0.0.1:$ephemeral_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
