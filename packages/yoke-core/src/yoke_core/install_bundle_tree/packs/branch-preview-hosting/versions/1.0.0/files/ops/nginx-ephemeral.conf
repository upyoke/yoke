# Route <slug>.{{preview_domain}} to the slug's deterministic local port.
# Install the companion njs file as
# /etc/nginx/njs.d/{{preview_namespace}}-port.js and this site as
# /etc/nginx/sites-available/{{preview_namespace}}.

js_path /etc/nginx/njs.d;
js_import {{preview_router_name}} from {{preview_namespace}}-port.js;
js_set $preview_port {{preview_router_name}}.computePort;

server {
    listen 0.0.0.0:443 ssl;
    server_name ~^(?<subdomain>.+)\.{{preview_domain}}$;

    ssl_certificate /etc/letsencrypt/live/{{preview_domain}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{preview_domain}}/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:$preview_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
