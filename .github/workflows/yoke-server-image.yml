name: yoke-server-image

# Classification: FACTORY. Publishes the Yoke server container image to
# GitHub Container Registry — the image the self-host compose bundle's
# .env references by default (see yoke_contracts.server_image). Stays
# with the product repo when it becomes public.
#
# Publication is tag-driven, so every validated release publishes the complete
# image set while branch pushes can never move latest to a development version.
#
# Fork safety: only annotated release tags that peel to their exact workflow
# commit can enter the build. Validation has read-only repository scope;
# native builds, manifest assembly, signing, and tag publication are separate
# GitHub-hosted jobs. The
# signer has no checkout or run step, and sha12/latest do not become visible
# until the digest attestation succeeds. No cloud credentials or operator
# registry are available in this lane.

on:
  push:
    tags:
      - "v*"

concurrency:
  # Different immutable releases build concurrently. The publication job moves
  # latest only when its tag is still the highest canonical launch tag, so an
  # older slow build can never roll the pointer backward.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  validate-tag:
    name: validate-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      latest_ref: ${{ steps.tag.outputs.latest_ref }}
      repository: ${{ steps.tag.outputs.repository }}
      release_version: ${{ steps.tag.outputs.release_version }}
      sha_ref: ${{ steps.tag.outputs.sha_ref }}
      sha_tag: ${{ steps.tag.outputs.sha_tag }}
      source_sha: ${{ steps.tag.outputs.source_sha }}
      tag_object_sha: ${{ steps.tag.outputs.tag_object_sha }}
    steps:
      - name: Require an immutable annotated release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          canonical_tag_re='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\+([a-z0-9]*[a-z][a-z0-9]*|0|[1-9][0-9]*)(\.([a-z0-9]*[a-z][a-z0-9]*|0|[1-9][0-9]*))*$'
          if [[ "$GITHUB_REF" != "refs/tags/$TAG_NAME" || ! "$TAG_NAME" =~ $canonical_tag_re ]]; then
            echo "image release tags must use canonical vX.Y.Z+local.N spelling without leading-zero numeric atoms: $TAG_NAME" >&2
            exit 1
          fi

          remote_ref="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG_NAME")"
          object_type="$(jq -r '.object.type' <<< "$remote_ref")"
          tag_object_sha="$(jq -r '.object.sha' <<< "$remote_ref")"
          if [[ "$object_type" != "tag" || ! "$tag_object_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "image release tag must be an annotated tag object: $TAG_NAME" >&2
            exit 1
          fi

          tag_object="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha")"
          target_type="$(jq -r '.object.type' <<< "$tag_object")"
          source_sha="$(jq -r '.object.sha' <<< "$tag_object")"
          if [[ "$target_type" != "commit" || "$source_sha" != "$GITHUB_SHA" ]]; then
            echo "remote image tag does not peel to workflow commit $GITHUB_SHA" >&2
            exit 1
          fi

          {
            owner="${GITHUB_REPOSITORY_OWNER,,}"
            repository="ghcr.io/$owner/yoke-server"
            sha_tag="${source_sha:0:12}"
            echo "repository=$repository"
            echo "sha_tag=$sha_tag"
            echo "sha_ref=$repository:$sha_tag"
            echo "latest_ref=$repository:latest"
            echo "release_version=${TAG_NAME#v}"
            echo "source_sha=$source_sha"
            echo "tag_object_sha=$tag_object_sha"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build-native-${{ matrix.arch }}
    needs: validate-tag
    permissions:
      contents: read
      packages: write
    # Deliberately NOT the runner-routing repository variable: publishing
    # to GHCR carries no operator state, so there is nothing a hosted
    # runner cannot do, and hard-pinning keeps this lane off operator
    # runner fleets even on repos where routing is configured.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.validate-tag.outputs.source_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the native content-addressed image
        id: push
        # The digest is pushed without sha12/latest. /v1/health exposes the
        # baked source SHA12, while package versions come directly from the
        # validated release tag rather than a branch development version.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          # Push the content-addressed image first, without mutating either
          # human-facing tag. The post-attestation publication job can then
          # refuse a conflicting immutable sha12 before creating it.
          outputs: type=image,name=${{ needs.validate-tag.outputs.repository }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          build-args: |
            YOKE_BUILD_SHA=${{ needs.validate-tag.outputs.sha_tag }}
            YOKE_ENGINE_VERSION=${{ needs.validate-tag.outputs.release_version }}

      - name: Verify native architecture and installed release metadata
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
          EXPECTED_BUILD: ${{ needs.validate-tag.outputs.sha_tag }}
          EXPECTED_VERSION: ${{ needs.validate-tag.outputs.release_version }}
          PUSHED_DIGEST: ${{ steps.push.outputs.digest }}
          REPOSITORY: ${{ needs.validate-tag.outputs.repository }}
        run: |
          image_ref="$REPOSITORY@$PUSHED_DIGEST"
          docker pull "$image_ref"
          actual_arch="$(docker image inspect \
            --format '{{.Architecture}}' "$image_ref")"
          if [[ "$actual_arch" != "$EXPECTED_ARCH" ]]; then
            echo "native image architecture mismatch: actual=$actual_arch expected=$EXPECTED_ARCH" >&2
            exit 1
          fi
          metadata="$(docker run --rm \
            --entrypoint python "$image_ref" -c \
            'import os; from importlib.metadata import version; print(version("yoke-core")); print(os.environ.get("YOKE_BUILD_SHA", ""))')"
          actual_version="$(sed -n '1p' <<< "$metadata")"
          actual_build="$(sed -n '2p' <<< "$metadata")"
          if [[ "$actual_version" != "$EXPECTED_VERSION" || "$actual_build" != "$EXPECTED_BUILD" ]]; then
            echo "pushed image metadata mismatch: version=$actual_version build=$actual_build expected version=$EXPECTED_VERSION build=$EXPECTED_BUILD" >&2
            exit 1
          fi
          echo "native image verified: arch=$actual_arch version=$actual_version build=$actual_build"

      - name: Export the native image digest
        run: |
          digest="${{ steps.push.outputs.digest }}"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "native build returned malformed digest: $digest" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/digests"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload the native image digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  assemble:
    name: assemble-content-addressed-image
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      packages: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
      staging_ref: ${{ steps.manifest.outputs.staging_ref }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download native image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Assemble and verify the multi-platform manifest
        id: manifest
        env:
          REPOSITORY: ${{ needs.validate-tag.outputs.repository }}
        run: |
          mapfile -t digest_files < <(
            find "$RUNNER_TEMP/digests" -maxdepth 1 -type f -print | sort
          )
          if [[ "${#digest_files[@]}" -ne 2 ]]; then
            echo "expected two native image digests, found ${#digest_files[@]}" >&2
            exit 1
          fi
          sources=()
          for digest_file in "${digest_files[@]}"; do
            digest="$(basename "$digest_file")"
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "malformed native image digest filename: $digest" >&2
              exit 1
            fi
            sources+=("$REPOSITORY@sha256:$digest")
          done

          staging_ref="$REPOSITORY:build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          metadata="$RUNNER_TEMP/manifest-metadata.json"
          docker buildx imagetools create \
            --tag "$staging_ref" \
            --metadata-file "$metadata" \
            "${sources[@]}"
          digest="$(jq -er '."containerimage.descriptor".digest' "$metadata")"
          registry_digest="$(docker buildx imagetools inspect \
            "$staging_ref" --format '{{ .Manifest.Digest }}')"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ || "$registry_digest" != "$digest" ]]; then
            echo "assembled manifest digest mismatch: metadata=$digest registry=$registry_digest" >&2
            exit 1
          fi
          manifest="$(docker buildx imagetools inspect \
            "$staging_ref" --format '{{json .Manifest}}')"
          platforms="$(jq -r \
            '[.manifests[]?.platform | select(.os != "unknown") | "\(.os)/\(.architecture)"] | unique | sort | join(",")' \
            <<< "$manifest")"
          if [[ "$platforms" != "linux/amd64,linux/arm64" ]]; then
            echo "assembled image lacks the required linux platforms: $platforms" >&2
            exit 1
          fi
          {
            echo "digest=$digest"
            echo "staging_ref=$staging_ref"
          } >> "$GITHUB_OUTPUT"

  attest:
    name: attest-content-addressed-image
    needs: [validate-tag, assemble]
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      # Deliberately no checkout and no run step: repository code never shares
      # the OIDC identity or attestation write scope.
      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest the untagged image digest
        id: attest_attempt_1
        continue-on-error: true
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ needs.validate-tag.outputs.repository }}
          subject-digest: ${{ needs.assemble.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Retry the image attestation after a registry transport failure
        id: attest_attempt_2
        if: steps.attest_attempt_1.outcome != 'success'
        continue-on-error: true
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ needs.validate-tag.outputs.repository }}
          subject-digest: ${{ needs.assemble.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Make the final image attestation attempt
        if: >-
          steps.attest_attempt_1.outcome != 'success' &&
          steps.attest_attempt_2.outcome != 'success'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ needs.validate-tag.outputs.repository }}
          subject-digest: ${{ needs.assemble.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  publish-tags:
    name: publish-and-verify-image-tags
    needs: [validate-tag, assemble, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Revalidate tag and publish image references
        id: references
        env:
          EXPECTED_SOURCE_SHA: ${{ needs.validate-tag.outputs.source_sha }}
          EXPECTED_TAG_OBJECT_SHA: ${{ needs.validate-tag.outputs.tag_object_sha }}
          GH_TOKEN: ${{ github.token }}
          LATEST_REF: ${{ needs.validate-tag.outputs.latest_ref }}
          PUSHED_DIGEST: ${{ needs.assemble.outputs.digest }}
          REPOSITORY: ${{ needs.validate-tag.outputs.repository }}
          SHA_REF: ${{ needs.validate-tag.outputs.sha_ref }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          remote_ref="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG_NAME")"
          object_type="$(jq -r '.object.type' <<< "$remote_ref")"
          tag_object_sha="$(jq -r '.object.sha' <<< "$remote_ref")"
          if [[ "$object_type" != "tag" || "$tag_object_sha" != "$EXPECTED_TAG_OBJECT_SHA" ]]; then
            echo "remote image tag changed before publication: $TAG_NAME" >&2
            exit 1
          fi
          tag_object="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha")"
          target_type="$(jq -r '.object.type' <<< "$tag_object")"
          source_sha="$(jq -r '.object.sha' <<< "$tag_object")"
          if [[ "$target_type" != "commit" || "$source_sha" != "$EXPECTED_SOURCE_SHA" || "$source_sha" != "$GITHUB_SHA" ]]; then
            echo "remote image tag no longer peels to the workflow commit" >&2
            exit 1
          fi
          inspect_error="$RUNNER_TEMP/sha12-inspect-error"
          existing_digest=""
          if existing_digest="$(docker buildx imagetools inspect \
            "$SHA_REF" --format '{{ .Manifest.Digest }}' \
            2>"$inspect_error")"; then
            if [[ "$existing_digest" != "$PUSHED_DIGEST" ]]; then
              echo "refusing conflicting immutable sha12: $SHA_REF is $existing_digest, build is $PUSHED_DIGEST" >&2
              exit 1
            fi
          elif grep -Eqi 'manifest unknown|not found' "$inspect_error"; then
            docker buildx imagetools create \
              --prefer-index=false \
              --tag "$SHA_REF" "$REPOSITORY@$PUSHED_DIGEST"
          else
            cat "$inspect_error" >&2
            exit 1
          fi

          latest_tag=""
          latest_key=""
          for page in $(seq 1 100); do
            release_refs="$(gh api \
              "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/v?per_page=100&page=$page")"
            while IFS= read -r candidate_ref; do
              if [[ "$candidate_ref" =~ ^refs/tags/(v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\+launch\.(0|[1-9][0-9]*))$ ]]; then
                printf -v candidate_key '%010d%010d%010d%010d' \
                  "${BASH_REMATCH[2]}" "${BASH_REMATCH[3]}" \
                  "${BASH_REMATCH[4]}" "${BASH_REMATCH[5]}"
                if [[ -z "$latest_key" || "$candidate_key" > "$latest_key" ]]; then
                  latest_key="$candidate_key"
                  latest_tag="${BASH_REMATCH[1]}"
                fi
              fi
            done < <(jq -r '.[].ref' <<< "$release_refs")
            ref_count="$(jq 'length' <<< "$release_refs")"
            if [[ "$ref_count" -lt 100 ]]; then
              break
            fi
          done
          if [[ "$TAG_NAME" = "$latest_tag" ]]; then
            docker buildx imagetools create \
              --prefer-index=false \
              --tag "$LATEST_REF" "$REPOSITORY@$PUSHED_DIGEST"
            echo "published_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "Keeping latest on newer release $latest_tag; published immutable $SHA_REF"
            echo "published_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify published references resolve to the built digest
        env:
          LATEST_REF: ${{ needs.validate-tag.outputs.latest_ref }}
          PUBLISHED_LATEST: ${{ steps.references.outputs.published_latest }}
          PUSHED_DIGEST: ${{ needs.assemble.outputs.digest }}
          SHA_REF: ${{ needs.validate-tag.outputs.sha_ref }}
        run: |
          sha_digest="$(docker buildx imagetools inspect \
            "$SHA_REF" --format '{{ .Manifest.Digest }}')"
          if [[ "$sha_digest" != "$PUSHED_DIGEST" ]]; then
            echo "published sha12 differs from built digest: sha12=$sha_digest built=$PUSHED_DIGEST" >&2
            exit 1
          fi
          if [[ "$PUBLISHED_LATEST" = "true" ]]; then
            latest_digest="$(docker buildx imagetools inspect \
              "$LATEST_REF" --format '{{ .Manifest.Digest }}')"
            if [[ "$latest_digest" != "$PUSHED_DIGEST" ]]; then
              echo "published latest differs from built digest: latest=$latest_digest built=$PUSHED_DIGEST" >&2
              exit 1
            fi
          fi
          manifest="$(docker buildx imagetools inspect \
            "$SHA_REF" --format '{{json .Manifest}}')"
          platforms="$(jq -r \
            '[.manifests[]?.platform | select(.os != "unknown") | "\(.os)/\(.architecture)"] | unique | sort | join(",")' \
            <<< "$manifest")"
          if [[ "$platforms" != "linux/amd64,linux/arm64" ]]; then
            echo "published image lacks the required linux platforms: $platforms" >&2
            exit 1
          fi
