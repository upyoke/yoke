name: yoke-server-image

# Classification: FACTORY. Publishes the Yoke server container image to
# GitHub Container Registry — the image the self-host compose bundle's
# .env references by default (see yoke_contracts.server_image). Stays
# with the product repo when it becomes public.
#
# Dormant until armed: the job is gated on the repository variable
# YOKE_PUBLISH_SERVER_IMAGE == 'true', so nothing publishes from this
# repository until the operator flips the variable on the public repo.
#
# Fork safety: never runs for a stranger's pull request (push-to-main and
# manual dispatch only); no step reads a repository secret beyond the
# workflow's own GITHUB_TOKEN. The token can publish packages and
# attestations, while a short-lived GitHub OIDC identity signs the exact
# pushed image digest. runs-on is hard-pinned to GitHub-hosted so this lane
# can never reach operator infrastructure. No cloud credentials, no operator
# registry — the private registry prewarm lane is a separate OPERATION
# workflow (yoke-core-image.yml).

on:
  push:
    branches: [main]
    paths-ignore:
      - ".yoke/strategy/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  # One global lane protects the immutable sha12 namespace and serializes the
  # intentional latest-pointer update across push and manual invocations.
  group: yoke-server-image-publication
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-push:
    name: build-push-ghcr
    if: ${{ vars.YOKE_PUBLISH_SERVER_IMAGE == 'true' && github.ref == 'refs/heads/main' }}
    # Deliberately NOT the runner-routing repository variable: publishing
    # to GHCR carries no operator state, so there is nothing a hosted
    # runner cannot do, and hard-pinning keeps this lane off operator
    # runner fleets even on repos where routing is configured.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The server wheel version is derived by setuptools-scm before the
          # Docker build, because the Docker context intentionally does not
          # carry .git into the image.
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve image references
        id: image
        run: |
          owner="${{ github.repository_owner }}"
          repository="ghcr.io/${owner,,}/yoke-server"
          sha_tag="${GITHUB_SHA:0:12}"
          {
            echo "repository=$repository"
            echo "sha_tag=$sha_tag"
            echo "sha_ref=$repository:$sha_tag"
            echo "latest_ref=$repository:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve package version
        id: version
        run: |
          python -m pip install "setuptools-scm[toml]==10.2.0"
          version="$(python -m setuptools_scm --root "$GITHUB_WORKSPACE")"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          set -o pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push the server image
        id: push
        # YOKE_BUILD_SHA bakes the source sha into the image; /v1/health
        # serves it as `build` so self-hosters can confirm WHICH code is
        # answering after an upgrade. One build produces one registry digest;
        # the guarded publication steps then attach both names to those bytes.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          # Push the content-addressed image first, without mutating either
          # human-facing tag. The following step can then refuse a conflicting
          # immutable sha12 before creating it.
          outputs: type=image,name=${{ steps.image.outputs.repository }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            YOKE_BUILD_SHA=${{ steps.image.outputs.sha_tag }}
            YOKE_ENGINE_VERSION=${{ steps.version.outputs.value }}

      - name: Publish immutable sha12 and latest references
        env:
          LATEST_REF: ${{ steps.image.outputs.latest_ref }}
          PUSHED_DIGEST: ${{ steps.push.outputs.digest }}
          REPOSITORY: ${{ steps.image.outputs.repository }}
          SHA_REF: ${{ steps.image.outputs.sha_ref }}
        run: |
          inspect_error="$RUNNER_TEMP/sha12-inspect-error"
          existing_digest=""
          if existing_digest="$(docker buildx imagetools inspect \
            "$SHA_REF" --format '{{ .Manifest.Digest }}' \
            2>"$inspect_error")"; then
            if [[ "$existing_digest" != "$PUSHED_DIGEST" ]]; then
              echo "refusing conflicting immutable sha12: $SHA_REF is $existing_digest, build is $PUSHED_DIGEST" >&2
              exit 1
            fi
          elif grep -Eqi 'manifest unknown|not found' "$inspect_error"; then
            docker buildx imagetools create \
              --prefer-index=false \
              --tag "$SHA_REF" "$REPOSITORY@$PUSHED_DIGEST"
          else
            cat "$inspect_error" >&2
            exit 1
          fi

          docker buildx imagetools create \
            --prefer-index=false \
            --tag "$LATEST_REF" "$REPOSITORY@$PUSHED_DIGEST"

      - name: Verify published references resolve to the built digest
        env:
          LATEST_REF: ${{ steps.image.outputs.latest_ref }}
          PUSHED_DIGEST: ${{ steps.push.outputs.digest }}
          SHA_REF: ${{ steps.image.outputs.sha_ref }}
        run: |
          sha_digest="$(docker buildx imagetools inspect \
            "$SHA_REF" --format '{{ .Manifest.Digest }}')"
          latest_digest="$(docker buildx imagetools inspect \
            "$LATEST_REF" --format '{{ .Manifest.Digest }}')"
          if [[ "$sha_digest" != "$PUSHED_DIGEST" || "$latest_digest" != "$PUSHED_DIGEST" ]]; then
            echo "published references differ from built digest: sha12=$sha_digest latest=$latest_digest built=$PUSHED_DIGEST" >&2
            exit 1
          fi

      - name: Attest the immutable image digest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          # The registry attachment plus GitHub attestation record are the
          # release contract; no broader organization artifact write is needed.
          create-storage-record: false
