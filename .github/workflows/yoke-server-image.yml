name: yoke-server-image

# Classification: FACTORY. Publishes the Yoke server container image to
# GitHub Container Registry — the image the self-host compose bundle's
# .env references by default (see yoke_contracts.server_image). Stays
# with the product repo when it becomes public.
#
# Dormant until armed: the job is gated on the repository variable
# YOKE_PUBLISH_SERVER_IMAGE == 'true', so nothing publishes from this
# repository until the operator flips the variable on the public repo.
#
# Fork safety: never runs for a stranger's pull request (push-to-main and
# manual dispatch only); no step reads a repository secret beyond the
# workflow's own GITHUB_TOKEN. The token can publish packages and
# attestations, while a short-lived GitHub OIDC identity signs the exact
# pushed image digest. runs-on is hard-pinned to GitHub-hosted so this lane
# can never reach operator infrastructure. No cloud credentials, no operator
# registry — the private registry prewarm lane is a separate OPERATION
# workflow (yoke-core-image.yml).

on:
  push:
    branches: [main]
    paths-ignore:
      - ".yoke/strategy/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-push:
    name: build-push-ghcr
    if: ${{ vars.YOKE_PUBLISH_SERVER_IMAGE == 'true' }}
    # Deliberately NOT the runner-routing repository variable: publishing
    # to GHCR carries no operator state, so there is nothing a hosted
    # runner cannot do, and hard-pinning keeps this lane off operator
    # runner fleets even on repos where routing is configured.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The server wheel version is derived by setuptools-scm before the
          # Docker build, because the Docker context intentionally does not
          # carry .git into the image.
          fetch-depth: 0

      - name: Resolve image references (sha12 and main-only latest)
        id: image
        run: |
          owner="${{ github.repository_owner }}"
          repository="ghcr.io/${owner,,}/yoke-server"
          sha_tag="${GITHUB_SHA:0:12}"
          {
            echo "repository=$repository"
            echo "sha_tag=$sha_tag"
            echo "tags<<EOF"
            echo "$repository:$sha_tag"
            if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              echo "$repository:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve package version
        id: version
        run: |
          python -m pip install "setuptools-scm[toml]"
          version="$(python -m setuptools_scm --root "$GITHUB_WORKSPACE")"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          set -o pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push the server image
        id: push
        # YOKE_BUILD_SHA bakes the source sha into the image; /v1/health
        # serves it as `build` so self-hosters can confirm WHICH code is
        # answering after an upgrade. One build pushes both names so latest
        # and the immutable sha12 tag resolve to the attested digest.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            YOKE_BUILD_SHA=${{ steps.image.outputs.sha_tag }}
            YOKE_ENGINE_VERSION=${{ steps.version.outputs.value }}

      - name: Attest the immutable image digest
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          # The registry attachment plus GitHub attestation record are the
          # release contract; no broader organization artifact write is needed.
          create-storage-record: false
