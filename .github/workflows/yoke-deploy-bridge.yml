name: yoke-deploy-bridge

# Classification: bridge. On a push to this product repo's stage/main,
# reproduce the deploy repo's own push behavior on the operator's SEPARATE
# deploy repo: build/prewarm the core image for the pushed product commit
# AND walk the environment deploy for it. This restores the single-repo
# habit of "push the product -> it deploys" when the deploy lives in its
# own repo.
#
# Generic + leak-safe by construction: the deploy repo, the two workflow
# files to run there, their ref, and the dispatch token are all read from
# repo variables / secrets, never hardcoded. A fork or self-hoster that has
# not set `YOKE_DEPLOY_DISPATCH_REPO` no-ops, so this file names no
# operator-private topology. Runs on the GitHub-hosted runner (public repos
# get them free); it only fires workflow_dispatch calls, never touching
# deploy infrastructure directly.
#
# The gate on the deploy side stays authoritative: this bridge dispatches
# for every push to stage/main, and the deploy repo's env-autodeploy gate
# decides what actually deploys (e.g. prod stays attended and no-ops). The
# env-deploy workflow is wait-only for a prewarmed image, so the image
# build is dispatched first for the same product commit.

on:
  push:
    branches: [stage, main]

permissions:
  contents: read

concurrency:
  group: yoke-deploy-bridge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch-deploy:
    name: dispatch image build + env deploy on the deploy repo
    runs-on: ubuntu-latest
    if: ${{ vars.YOKE_DEPLOY_DISPATCH_REPO != '' }}
    steps:
      - name: Dispatch the image build and env deploy
        env:
          GH_TOKEN: ${{ secrets.YOKE_DEPLOY_DISPATCH_TOKEN }}
          DISPATCH_REPO: ${{ vars.YOKE_DEPLOY_DISPATCH_REPO }}
          IMAGE_WORKFLOW: ${{ vars.YOKE_DEPLOY_DISPATCH_IMAGE_WORKFLOW || 'yoke-core-image.yml' }}
          DEPLOY_WORKFLOW: ${{ vars.YOKE_DEPLOY_DISPATCH_WORKFLOW || 'yoke-env-deploy.yml' }}
          DISPATCH_REF: ${{ vars.YOKE_DEPLOY_DISPATCH_REF || 'main' }}
          PRODUCT_SHA: ${{ github.sha }}
          PRODUCT_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::YOKE_DEPLOY_DISPATCH_TOKEN is not set — configure it to enable push-to-deploy. Skipping."
            exit 0
          fi
          # Deploy the exact product commit just pushed. The deploy repo
          # name is not echoed, to keep it out of this public repo's logs.
          echo "Dispatching image build + env deploy for product ${PRODUCT_BRANCH}@${PRODUCT_SHA}"
          # 1. Build/prewarm the core image for the pushed product sha.
          gh workflow run "$IMAGE_WORKFLOW" \
            --repo "$DISPATCH_REPO" \
            --ref "$DISPATCH_REF" \
            -f product_ref="$PRODUCT_SHA"
          # 2. Walk the env deploy for it (waits for the image above, then
          #    the deploy repo's auto-deploy policy gate decides the env).
          gh workflow run "$DEPLOY_WORKFLOW" \
            --repo "$DISPATCH_REPO" \
            --ref "$DISPATCH_REF" \
            -f product_ref="$PRODUCT_SHA" \
            -f product_branch="$PRODUCT_BRANCH"
