# Route <slug>.preview.upyoke.com to the slug's deterministic local port.
# Install the companion njs file as
# /etc/nginx/njs.d/yoke-preview-port.js and this site as
# /etc/nginx/sites-available/yoke-preview.

js_path /etc/nginx/njs.d;
js_import yoke_preview from yoke-preview-port.js;
js_set $preview_port yoke_preview.computePort;

server {
    listen 0.0.0.0:443 ssl;
    server_name ~^(?<subdomain>.+)\.preview.upyoke.com$;

    ssl_certificate /etc/letsencrypt/live/preview.upyoke.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preview.upyoke.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:$preview_port;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
