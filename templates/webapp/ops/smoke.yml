# smoke.yml — Post-deploy smoke test
#
# The owning Yoke deployment run dispatches this post-deploy verification.
#
# Template variables:
#   {{PROJECT_NAME_UPPER}} — uppercase project name (e.g., ACME) for secret names
#   {{project_display_name}} — human-readable name (e.g., Acme) for workflow title
#   Uses ${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_USER }} for SSH user (secret-based)
#   {{api_port}}           — API health check port (e.g., 8000)
#   {{web_port}}           — Web frontend port (e.g., 3000)
#   {{web_smoke_paths}}    — Comma-separated additional smoke paths (e.g., /forgot-password,/login)

name: {{project_display_name}} Smoke Test
run-name: "{{project_display_name}} smoke [yoke-dispatch:${{ inputs.yoke_dispatch_id }}]"

on:
  workflow_dispatch:
    inputs:
      yoke_dispatch_id:
        description: 'Opaque Yoke dispatch correlation token for the owning deployment run'
        required: true
        type: string
      commit_sha:
        description: 'Expected commit SHA to verify against deployed version'
        required: false
        default: ''

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Set up SSH key
        run: |
          echo "${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Check API health
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_USER }}@${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_HOST }} \
            'curl -sf http://localhost:{{api_port}}/api/health'

      - name: Verify deployed version
        if: inputs.commit_sha != ''
        run: |
          EXPECTED="${{ inputs.commit_sha }}"
          ACTUAL=$(ssh -i ~/.ssh/deploy_key \
            ${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_USER }}@${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_HOST }} \
            'cat ~/{{project_name}}-app/.deploy-version 2>/dev/null || echo "none"')
          ACTUAL=$(echo "$ACTUAL" | tr -d '[:space:]')
          echo "Expected: $EXPECTED"
          echo "Deployed: $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Version mismatch — smoke test is running against a stale deployment"
            exit 1
          fi
          echo "Version verified"

      - name: Check web frontend
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_USER }}@${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_HOST }} \
            'curl -sf -o /dev/null -w "%{http_code}" http://localhost:{{web_port}} | grep -qE "^(200|307)$"'

      - name: Check additional smoke paths
        run: |
          SMOKE_PATHS="{{web_smoke_paths}}"
          if [ -z "$SMOKE_PATHS" ]; then
            echo "No additional smoke paths configured — skipping"
            exit 0
          fi
          IFS=','
          for path in $SMOKE_PATHS; do
            echo "Checking smoke path: $path"
            ssh -i ~/.ssh/deploy_key \
              ${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_USER }}@${{ secrets.{{PROJECT_NAME_UPPER}}_SSH_HOST }} \
              "curl -sf -o /dev/null -w \"%{http_code}\" http://localhost:{{web_port}}${path} | grep -qE \"^(200|307)$\""
            echo "Smoke path $path passed"
          done
